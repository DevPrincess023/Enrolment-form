<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDENT ENROLMENT FORM</title>
</head>

<body>
    <h2>STUDENT ENROLMENT FORM</h2>
    <form action="/submit" method="post">

        <fieldset>
            <legend>Personal Details</legend>

            <label for="fname"> First Name:</label> <br>
            <input type="text" id="fname" name="fname" required> <br><br>
            <label for="oname"> Other Names:</label> <br>
            <input type="text" id="oname" name="oname" required> <br><br>
            <label for="lname">Last Name:</label><br>
            <input type="text" id="lname" name="lname" required><br><br>

            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone"><br><br>

            <label for="dob">Date of Birth:</label><br>
            <input type="date" id="dob" name="dob"><br>

            <p>Gender:</p>
            <label>
                <input type="radio" name="gender" value="male">Male
            </label>
            <label>
                <input type="radio" name="gender" value="female">Female
            </label>
            <label>
                <input type="radio" name="gender" value="other">Other
            </label> <br><br>

            <fieldset>
                <legend>Account Details</legend>
                <label for="course">Preferred Course:</label>
                <select name="course" id="course">
                    <optgroup label="ARTS">
                        <option value="tfs">Theatre and Film Studies</option>
                        <option value="his">History and International Studies</option>
                        <option value="mus">Music</option>
                        <option value="chs">Chinese Studies</option>
                        <option value="res">Religion Studies</option>
                    </optgroup>

                    <optgroup label="SCIENCE">
                        <option value="eng">Engineeering</option>
                        <option value="med">Medicine</option>
                        <option value="bio">Biology</option>
                        <option value="che">Chemistry</option>
                        <option value="bot">Botany</option>
                    </optgroup>
                </select><br><br>

                <label for="photo">Upload Profile Photo:</label><br>
                <input type="file" id="photo" name="photo" accept="image/*">
            </fieldset><br>

            <label for="message">Message/Notes:</label><br>
            <textarea name="message" id="message" rows="5" cols="50" placeholder="write your message here....">
        </textarea>
        </fieldset><br>

        <label>
            <input type="checkbox" name="agree" required>
            I agree to the Terms and Conditions
        </label><br><br>

        <button type="submit">Submit</button>
        <button type="reset">Clear</button>
    </form>
</body>

</html>
